<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вопросы</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6e7,#ffeaf5,#ffc4da);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.container{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
width:320px;
}

h2{
color:#ff4f9a;
}

button{
margin:8px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#ff8fc0;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff5fa7;
}

#answer{
margin-top:20px;
font-size:22px;
color:#ff4f9a;
opacity:0;
}

.show{
animation:appear 0.6s forwards;
}

@keyframes appear{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* частицы */

.particle{
position:absolute;
font-size:24px;
animation:fly 3s linear forwards;
}

@keyframes fly{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-250px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<div id="menu">
<h2>Выбери вопрос</h2>

<button onclick="showQ1()">1 вопрос</button>
<button onclick="showQ2()">2 вопрос</button>
</div>

<div id="q1" style="display:none;">
<h2>Как день прошел?</h2>

<button onclick="showAnswer('СУПЕРРР 😎','pink')">Намана</button>
<button onclick="showAnswer('грустноооо 😭','cry')">Хуйево</button>
<button onclick="showAnswer('УРАААА 🎉','red')">ахуительноооооо</button>

<br>
<button onclick="back()">⬅ Назад</button>
</div>

<div id="q2" style="display:none;">
<h2>Как дела?</h2>

<button onclick="showAnswer('ты крутой(ая) 😍','love')">Намана</button>
<button onclick="showAnswer('ээхххх 😢','sad')">неееоч</button>

<br>
<button onclick="back()">⬅ Назад</button>
</div>

<div id="answer"></div>

</div>

<script>

function showQ1(){
menu.style.display="none";
q1.style.display="block";
}

function showQ2(){
menu.style.display="none";
q2.style.display="block";
}

function back(){
menu.style.display="block";
q1.style.display="none";
q2.style.display="none";
answer.style.opacity="0";
}

function showAnswer(text,type){

let ans=document.getElementById("answer");

ans.classList.remove("show");
ans.innerText="(" + text + ")";

setTimeout(()=>{
ans.classList.add("show");
},10);

particles(type);

}

function particles(type){

let emoji="💗";

if(type=="pink") emoji="💗";
if(type=="red") emoji="❤️";
if(type=="cry") emoji="😭";
if(type=="love") emoji="😍";
if(type=="sad") emoji="😢";

for(let i=0;i<10;i++){

let p=document.createElement("div");
p.className="particle";
p.innerHTML=emoji;

p.style.left=Math.random()*100+"vw";
p.style.top="70vh";
p.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},3000);

}

}

</script>

</body>
</html>
